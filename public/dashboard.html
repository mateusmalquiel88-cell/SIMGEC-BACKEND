<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#d60000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="SIMGEC" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23d60000' width='192' height='192'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='80' font-weight='bold' fill='%23b8ff6c' font-family='Arial'>S</text></svg>" />
  <title>SIMGEC Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
  <meta name="theme-color" content="#0d6efd" />
  <style>
    :root {
      --primary: #0d6efd;
      --secondary: #00c4a7;
      --accent: #ffb020;
      --background: #071029;
      --surface: #0f1724;
      --text: #e6f0ff;
      --muted: #9fb7d9;
      --border: rgba(13, 110, 253, 0.25);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--background);
      color: var(--text);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: linear-gradient(90deg, var(--primary) 0%, rgba(13, 110, 253, 0.85) 45%, rgba(13, 110, 253, 0.24) 100%);
      color: white;
      border-bottom: 1px solid rgba(13, 110, 253, 0.35);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
    }

    .flag { display: flex; align-items: center; gap: 10px; font-weight: bold; }
    .flag-icon { font-size: 1.5rem; }
    .nav-container { display: flex; gap: 12px; align-items: center; }
    .nav-link {
      background: transparent;
      border: 1px solid var(--secondary);
      color: var(--secondary);
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s ease;
      font-size: 0.95rem;
    }
    .nav-link:hover { background: var(--secondary); color: var(--background); }

    header { padding: 24px 24px 12px; }
    h1 { margin: 0; color: var(--text); text-shadow: 0 0 16px rgba(13, 110, 253, 0.28); }
    main { padding: 16px 24px 32px; }

    .card {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
      padding: 24px;
    }

    .grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
    .stat {
      background: rgba(13, 110, 253, 0.08);
      border: 1px solid rgba(13, 110, 253, 0.18);
      padding: 20px;
      border-radius: 16px;
      text-align: center;
    }
    .stat-value { font-size: 2.5rem; font-weight: bold; color: var(--primary); }
    .stat-label { color: var(--muted); margin-top: 8px; font-size: 0.95rem; }

    .table { width: 100%; border-collapse: collapse; }
    .table th, .table td { padding: 12px 10px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .table th { color: var(--text); background: rgba(13, 110, 253, 0.08); }
    .table td { color: #dbe5ff; }

    .status { display: inline-flex; align-items: center; gap: 8px; }
    .badge { padding: 5px 12px; border-radius: 999px; background: var(--primary); color: #fff; font-size: 0.78rem; }
    .error { color: #ff8b8b; }
    .chart-container { position: relative; height: 300px; margin-top: 16px; margin-bottom: 16px; }

    .btn-group { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      background: var(--secondary);
      color: var(--background);
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 28px rgba(13, 110, 253, 0.18);
    }

    @media (max-width: 720px) {
      .btn-group { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="flag"><span class="flag-icon">🇦🇴</span><span>Angola</span></div>
    <div class="nav-container">
      <a class="nav-link" id="registerLink" href="/registrar-aluno">➕ Registar Aluno</a>
      <a class="nav-link" id="chatLink" href="/chat">💬 Chat</a>
      <a class="nav-link" id="mockupLink" href="/mockup">🎨 Mockup</a>
      <a class="nav-link" id="adminLink" style="display:none;" href="/admin">⚙️ Admin</a>
      <button class="nav-link" id="logoutButton" style="cursor: pointer;">🚪 Logout</button>
    </div>
  </div>
  <header>
    <h1>Dashboard SIMGEC</h1>
  </header>
  <main>
    <div class="grid">
      <div class="stat">
        <div class="stat-value" id="totalAlunos">0</div>
        <div class="stat-label">Total de Alunos</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalClasses">0</div>
        <div class="stat-label">Turmas Ativas</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="avgAge">0</div>
        <div class="stat-label">Idade Média</div>
      </div>
    </div>

    <div class="card">
      <h2>Distribuição de Alunos por Turma</h2>
      <div class="chart-container">
        <canvas id="classeChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h2>Distribuição por Faixa Etária</h2>
      <div class="chart-container">
        <canvas id="ageChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h2>Últimos Alunos Registados</h2>
      <table class="table">
        <thead>
          <tr><th>ID</th><th>Nome</th><th>Idade</th><th>Turma</th></tr>
        </thead>
        <tbody id="alunosTable"></tbody>
      </table>
    </div>
    <div class="card">
      <h2>Eventos em Tempo Real</h2>
      <pre id="eventsLog" style="white-space: pre-wrap; word-break: break-word; max-height: 240px; overflow: auto; background: rgba(0,255,102,0.1); padding: 12px; border-radius: 8px; border: 1px solid rgba(0,255,102,0.2);"></pre>
    </div>
  </main>

  <script>
    // Token is provided via HttpOnly cookie; no token sync from query needed
    const statusEl = document.getElementById('totalAlunos');
    const totalAlunosEl = document.getElementById('totalAlunos');
    const totalClassesEl = document.getElementById('totalClasses');
    const avgAgeEl = document.getElementById('avgAge');
    const alunosTableEl = document.getElementById('alunosTable');
    const eventsLogEl = document.getElementById('eventsLog');
    const adminLink = document.getElementById('adminLink');
    const chatLink = document.getElementById('chatLink');
    const registerLink = document.getElementById('registerLink');
    const mockupLink = document.getElementById('mockupLink');
    const logoutBtn = document.getElementById('logoutButton');

    let classeChart, ageChart;

    function appendEvent(text) {
      eventsLogEl.textContent = `${new Date().toLocaleTimeString()} - ${text}\n${eventsLogEl.textContent}`;
    }

    async function loadResumo() {
      try {
        // Verify session using HttpOnly cookie
        const verifyRes = await fetch('/auth/verify', { credentials: 'same-origin' });
        if (!verifyRes.ok) {
          window.location.href = '/';
          return;
        }
        const verifyData = await verifyRes.json();
        const userRole = verifyData.user && verifyData.user.role;

        // Show admin link if user is admin
        if (userRole === 'admin') {
          adminLink.style.display = 'inline-block';
          adminLink.href = '/admin';
        }

        if (chatLink) {
          chatLink.href = '/chat';
        }

        if (registerLink) {
          registerLink.href = '/registrar-aluno';
        }

        if (mockupLink) {
          mockupLink.href = '/mockup';
        }

        const headers = { 'Content-Type': 'application/json' };

        const [resAnalytics, resAlunos] = await Promise.all([
          fetch('/analytics/summary', { headers, credentials: 'same-origin' }),
          fetch('/alunos', { headers, credentials: 'same-origin' })
        ]);

        if (resAnalytics.ok) {
          const summary = await resAnalytics.json();
          totalAlunosEl.textContent = summary.totalAlunos;
          totalClassesEl.textContent = summary.alunosPorTurma ? summary.alunosPorTurma.length : 0;
          renderClasseChart(summary.alunosPorTurma || []);
        } else {
          appendEvent('⚠️ Erro ao carregar estatísticas');
        }

        if (resAlunos.ok) {
          const alunos = await resAlunos.json();
          alunosTableEl.innerHTML = alunos.slice(0, 10).map(aluno => 
            `<tr><td>${aluno.id}</td><td>${aluno.nome}</td><td>${aluno.idade}</td><td>${aluno.turma}</td></tr>`
          ).join('');
          
          const avgAge = alunos.length > 0 
            ? (alunos.reduce((sum, a) => sum + a.idade, 0) / alunos.length).toFixed(1)
            : 0;
          avgAgeEl.textContent = avgAge;
          
          renderAgeChart(alunos);
          appendEvent('✅ Dashboard atualizado');
        } else {
          alunosTableEl.innerHTML = `<tr><td colspan="4" class="error">Falha ao carregar alunos</td></tr>`;
        }
      } catch (err) {
        appendEvent('❌ Erro: ' + err.message);
      }
    }

    function renderClasseChart(classes) {
      const ctx = document.getElementById('classeChart').getContext('2d');
      if (classeChart) classeChart.destroy();
      classeChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: classes.map(c => c.turma),
          datasets: [{
            label: 'Alunos por Turma',
            data: classes.map(c => c.total),
            backgroundColor: '#00ff66',
            borderColor: '#b8ff6c',
            borderWidth: 2
          }]
        },
        options: { 
          responsive: true, 
          maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#b8ff6c' } } },
          scales: { 
            y: { ticks: { color: '#8fff88' }, grid: { color: 'rgba(0,255,102,0.1)' } }, 
            x: { ticks: { color: '#8fff88' }, grid: { color: 'rgba(0,255,102,0.1)' } } 
          }
        }
      });
    }

    function renderAgeChart(alunos) {
      const ageGroups = { '5-10': 0, '11-14': 0, '15-18': 0, '18+': 0 };
      alunos.forEach(a => {
        if (a.idade <= 10) ageGroups['5-10']++;
        else if (a.idade <= 14) ageGroups['11-14']++;
        else if (a.idade <= 18) ageGroups['15-18']++;
        else ageGroups['18+']++;
      });

      const ctx = document.getElementById('ageChart').getContext('2d');
      if (ageChart) ageChart.destroy();
      ageChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: Object.keys(ageGroups),
          datasets: [{
            data: Object.values(ageGroups),
            backgroundColor: ['#00ff66', '#b8ff6c', '#92ff74', '#6fdd5c']
          }]
        },
        options: { 
          responsive: true, 
          maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#b8ff6c' } } }
        }
      });
    }

    function connectEvents() {
      // SSE will receive cookie automatically for same-origin requests
      const source = new EventSource('/events/alunos');

      source.onopen = () => appendEvent('📡 Conexão SSE estabelecida');
      source.onerror = () => {
        appendEvent('⚠️ Erro na conexão SSE');
        setTimeout(connectEvents, 3000);
      };

      source.addEventListener('alunos', (event) => {
        const payload = JSON.parse(event.data);
        appendEvent(`📝 ${payload.action.toUpperCase()}: ${payload.aluno.nome}`);
        loadResumo();
      });
    }

    logoutBtn.addEventListener('click', async () => {
      try {
        await fetch('/auth/logout', { method: 'POST', credentials: 'same-origin' });
      } catch (err) {
        console.warn('Logout fetch failed:', err);
      }
      document.cookie = 'simgc_token=; path=/; Max-Age=0; SameSite=Lax';
      window.location.href = '/';
    });

    document.addEventListener('DOMContentLoaded', () => {
      loadResumo();
      connectEvents();
    });
  </script>
</body>
</html>
