<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIMGEC - Registar Aluno</title>
  <meta name="theme-color" content="#0d6efd" />
  <style>
    :root {
      --primary: #0d6efd;
      --secondary: #00c4a7;
      --background: #071029;
      --surface: #0f1724;
      --text: #e6f0ff;
      --muted: #9fb7d9;
      --border: rgba(13, 110, 253, 0.25);
      --shadow: 0 24px 60px rgba(0,0,0,0.28);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: var(--background); color: var(--text); }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: linear-gradient(90deg, var(--primary) 0%, rgba(13, 110, 253, 0.92) 40%, rgba(13, 110, 253, 0.14) 100%);
      border-bottom: 1px solid rgba(13, 110, 253, 0.25);
    }
    .flag { display:flex; align-items:center; gap:10px; font-weight:bold; }
    .flag-icon { font-size:1.5rem; }
    .nav { display:flex; gap:12px; }
    .nav-link { color: var(--secondary); text-decoration:none; padding:8px 14px; border:1px solid var(--secondary); border-radius: 10px; cursor:pointer; transition: all 0.2s ease; }
    .nav-link:hover { background: var(--secondary); color: var(--background); }
    .container { max-width: 650px; margin: 36px auto; padding: 28px; background: var(--surface); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; box-shadow: var(--shadow); }
    h1 { color: var(--text); text-shadow: 0 0 16px rgba(13, 110, 253, 0.24); margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    label { display:block; font-weight:600; color: var(--muted); margin-bottom:6px; }
    input, select { width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: var(--text); }
    input:focus, select:focus { outline:none; box-shadow: 0 0 18px rgba(13,110,253,0.25); border-color: var(--primary); }
    .button-group { display:flex; flex-wrap:wrap; gap:12px; margin-top:24px; }
    button { flex:1; min-width: 148px; padding: 12px 16px; border:none; border-radius: 12px; font-size:1rem; cursor:pointer; transition: all 0.2s ease; }
    .submit-btn { background: var(--secondary); color: var(--background); font-weight:700; }
    .submit-btn:hover { background: #1bcaa8; }
    .cancel-btn { background: transparent; border: 1px solid var(--secondary); color: var(--secondary); }
    .cancel-btn:hover { background: var(--secondary); color: var(--background); }
    .message { padding: 14px 16px; border-radius: 12px; margin-bottom: 16px; }
    .success { background: rgba(0, 192, 167, 0.16); border: 1px solid #00c4a7; color: #d3fff6; }
    .error { background: rgba(255, 107, 107, 0.18); border: 1px solid #ff6b6b; color: #ffb3b3; }
    .info { background: rgba(13, 110, 253, 0.12); border: 1px solid rgba(13, 110, 253, 0.35); color: #cfe3ff; }
    .form-hint { font-size: 0.9rem; color: #9fb7d9; margin-top: 4px; }
    .validation-error { color: #ff8b8b; font-size: 0.9rem; margin-top: 4px; }
    @media (max-width: 720px) { .button-group { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="flag"><span class="flag-icon">🇦🇴</span><span>SIMGEC - Registar Aluno</span></div>
    <div class="nav">
      <a id="registerDashboardLink" class="nav-link" href="/dashboard">Dashboard</a>
      <a id="registerChatLink" class="nav-link" href="/chat">💬 Chat</a>
      <a class="nav-link" onclick="logout()">Logout</a>
    </div>
  </div>

  <div class="container">
    <h1>Registar Novo Aluno</h1>
    
    <div id="messageBox"></div>

    <form id="registroForm">
      <div class="form-group">
        <label for="nome">Nome Completo *</label>
        <input type="text" id="nome" name="nome" placeholder="Ex: João Silva" required />
        <div class="form-hint">Mínimo 3 caracteres</div>
      </div>

      <div class="form-group">
        <label for="idade">Idade *</label>
        <input type="number" id="idade" name="idade" min="5" max="100" placeholder="Ex: 15" required />
        <div class="form-hint">Entre 5 e 100 anos</div>
      </div>

      <div class="form-group">
        <label for="turma">Turma *</label>
        <select id="turma" name="turma" required>
          <option value="">-- Selecione uma turma --</option>
          <option value="7º A">7º A</option>
          <option value="7º B">7º B</option>
          <option value="8º A">8º A</option>
          <option value="8º B">8º B</option>
          <option value="9º A">9º A</option>
          <option value="9º B">9º B</option>
          <option value="10º A">10º A</option>
          <option value="10º B">10º B</option>
          <option value="11º A">11º A</option>
          <option value="11º B">11º B</option>
          <option value="12º A">12º A</option>
          <option value="12º B">12º B</option>
        </select>
      </div>

      <div class="button-group">
        <button type="submit" class="submit-btn">Registar Aluno</button>
        <button type="button" class="cancel-btn" onclick="window.history.back()">Cancelar</button>
      </div>
    </form>

    <div style="margin-top: 24px; padding-top: 16px; border-top: 1px solid rgba(0,255,102,0.2);">
      <p style="color: #8fff88; font-size: 0.9rem;">
        <strong>Nota:</strong> Todos os campos são obrigatórios. Os dados serão armazenados de forma segura e apenas acessíveis a utilizadores autorizados.
      </p>
    </div>
  </div>

  <script>
    const registerDashboardLink = document.getElementById('registerDashboardLink');
    const registerChatLink = document.getElementById('registerChatLink');

    async function verifySession() {
      try {
        const res = await fetch('/auth/verify', { credentials: 'same-origin' });
        if (!res.ok) {
          window.location.href = '/';
          return null;
        }

        const data = await res.json();
        if (!data.user || !['admin', 'operator'].includes(data.user.role)) {
          window.location.href = '/';
          return null;
        }

        if (registerDashboardLink) registerDashboardLink.href = '/dashboard';
        if (registerChatLink) registerChatLink.href = '/chat';
        return data.user;
      } catch (err) {
        console.error('Erro de verificação:', err);
        window.location.href = '/';
        return null;
      }
    }

    verifySession();

    const form = document.getElementById('registroForm');
    const messageBox = document.getElementById('messageBox');

    function showMessage(text, type) {
      messageBox.innerHTML = `<div class="message ${type}">${text}</div>`;
      if (type === 'success') {
        setTimeout(() => form.reset(), 2000);
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const nome = document.getElementById('nome').value.trim();
      const idade = parseInt(document.getElementById('idade').value);
      const turma = document.getElementById('turma').value.trim();

      // Validação básica
      if (nome.length < 3) {
        showMessage('Nome deve ter pelo menos 3 caracteres', 'error');
        return;
      }

      if (idade < 5 || idade > 100) {
        showMessage('Idade deve estar entre 5 e 100 anos', 'error');
        return;
      }

      if (!turma) {
        showMessage('Selecione uma turma válida', 'error');
        return;
      }

      try {
        showMessage('A enviar dados...', 'info');

        const response = await fetch('/alunos', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ nome, idade, turma })
        });

        const data = await response.json();

        if (!response.ok) {
          showMessage(`Erro: ${data.message}`, 'error');
          return;
        }

        showMessage(`Aluno "${nome}" registado com sucesso!`, 'success');
        form.reset();
      } catch (err) {
        showMessage('Erro ao registar aluno. Tente novamente.', 'error');
        console.error('Erro:', err);
      }
    });

    async function logout() {
      if (!confirm('Tem a certeza que deseja fazer logout?')) return;
      try {
        await fetch('/auth/logout', { method: 'POST', credentials: 'same-origin' });
      } catch (err) {
        console.warn('Logout fetch failed:', err);
      }
      document.cookie = 'simgc_token=; path=/; Max-Age=0; SameSite=Lax';
      window.location.href = '/';
    }
  </script>
</body>
</html>
