<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0d6efd" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="SIMGEC" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23d60000' width='192' height='192'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-size='80' font-weight='bold' fill='%23b8ff6c' font-family='Arial'>S</text></svg>" />
  <title>SIMGEC Login</title>
  <style>
    :root{
      --bg: #071029;
      --surface: #0f1724;
      --primary: #0d6efd; /* blue */
      --accent: #00c4a7; /* teal */
      --text: #e6f0ff;
      --muted: #9fb7d9;
      --danger: #ff6b6b;
    }
    *{box-sizing:border-box}
    body { font-family: Inter, system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif; margin: 0; background: linear-gradient(180deg,var(--bg), #021225 80%); display: flex; align-items: center; justify-content: center; min-height: 100vh; color: var(--text); }
    .topbar { position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 12px 18px; background: linear-gradient(90deg, var(--primary) 0%, rgba(13,110,253,0.9) 40%, transparent 60%); color: white; box-shadow: 0 2px 12px rgba(0,0,0,0.5); }
    .flag { display: flex; align-items: center; gap: 10px; font-size: 0.95rem; font-weight: 700; }
    .flag-icon { font-size: 1.4rem; }
    .container { width: calc(100% - 48px); max-width: 420px; padding: 22px; background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01)); border: 1px solid rgba(255,255,255,0.04); border-radius: 14px; box-shadow: 0 8px 30px rgba(2,8,23,0.6); backdrop-filter: blur(8px); }
    h1 { margin-top: 0; color: var(--text); font-size: 1.6rem; }
    label { display: block; margin-top: 12px; font-weight: 600; color: var(--muted); font-size: 0.95rem }
    input { width: 100%; padding: 12px 14px; margin-top: 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); background: rgba(255,255,255,0.02); color: var(--text); }
    input::placeholder{ color: rgba(255,255,255,0.35) }
    input:focus { outline: none; box-shadow: 0 6px 20px rgba(13,110,253,0.16); border-color: rgba(13,110,253,0.6); }
    button { margin-top: 18px; width: 100%; padding: 12px 14px; border: none; border-radius: 10px; background: var(--primary); color: #fff; font-size: 1rem; cursor: pointer; box-shadow: 0 12px 30px rgba(13,110,253,0.16); }
    button:hover { filter: brightness(1.03); }
    .note { margin-top: 12px; color: var(--muted); font-size: 0.9rem; }
    .error { margin-top: 12px; color: var(--danger); font-weight:700 }

    @media (max-width: 520px){
      .container{ padding:18px; border-radius:12px }
      h1{ font-size:1.3rem }
      .topbar{ padding:10px 12px }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="flag"><span class="flag-icon">🇦🇴</span> Bandeira de Angola</div>
    <div>Interface SIMGEC</div>
  </div>
  <div class="container">
    <h1>Entrar no SIMGEC</h1>
    <form id="loginForm" action="/auth/login" method="POST">
      <label for="email">Email</label>
      <input type="text" id="email" name="email" value="marotheus.mora" required />

      <label for="password">Senha</label>
      <input type="password" id="password" name="password" required />

      <button type="submit">Entrar</button>
      <p class="error" id="errorMessage"></p>
    </form>
    <p class="note">Use o administrador padrão ou registre outro utilizador em /auth/register.</p>
  </div>

  <script>
    async function checkToken() {
      try {
        // Rely on HttpOnly cookie; send credentials so cookie is included
        const response = await fetch('/auth/verify', { credentials: 'same-origin' });
        return response.ok;
      } catch {
        return false;
      }
    }

    (async () => {
      const isValid = await checkToken();
      if (isValid) {
        window.location.href = '/dashboard';
        return;
      } else {
        document.cookie = 'simgc_token=; path=/; Max-Age=0; SameSite=Lax';
      }
    })();

    document.getElementById('loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorMessage = document.getElementById('errorMessage');
      errorMessage.textContent = '';

      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();
        if (!response.ok) {
          errorMessage.textContent = data.message || 'Falha no login';
          return;
        }

        // Server sets HttpOnly cookie and session is now active
        window.location.href = '/dashboard';
      } catch (err) {
        console.error('Login error:', err);
        errorMessage.textContent = 'Erro no login, tente novamente.';
      }
    });

    // Registar Service Worker para PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
        .then((registration) => {
          console.log('[PWA] Service Worker registado:', registration.scope);
        })
        .catch((err) => {
          console.warn('[PWA] Erro ao registar Service Worker:', err);
        });
    }

    // Detectar modo offline
    window.addEventListener('offline', () => {
      console.log('[PWA] Offline detectado');
    });

    window.addEventListener('online', () => {
      console.log('[PWA] Online restaurado');
    });
  </script>
  <script src="/offline-sync.js"></script>
</body>
</html>
